<div id="chajian-settings-panel" class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>聊天剧情吐槽</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
    </div>
    <div class="inline-drawer-content">
        <div class="settings_section">
            <label for="chajian-enabled-toggle" class="checkbox_label flex-container alignItemsCenter">
                <input id="chajian-enabled-toggle" type="checkbox" />
                <span>启用吐槽伴侣悬浮窗</span>
            </label>
        </div>
        <div class="settings_section">
            <small>取消勾选后会完全隐藏插件悬浮窗与相关弹窗。</small>
        </div>
    </div>
</div>
